spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/timetracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT
jwt.secret=${JWT_SECRET:dGltZVRyYWNrZXJTZWNyZXRLZXlGb3JWZXJzaW9uMU11bHRpVXNlcjIwMjY=}
jwt.expiration=86400000

server.port=8080
